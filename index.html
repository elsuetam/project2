<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Para Anna Laura Pedroso ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial, Helvetica, sans-serif;

background:linear-gradient(135deg,#ff8fb1,#ffd6e8);

}

.caixa{

background:white;
padding:45px;
border-radius:25px;
box-shadow:0 0 35px rgba(0,0,0,.2);
text-align:center;
max-width:750px;
width:85%;
z-index:10;

}

h1{

color:#ff0066;
margin-bottom:25px;

}

button{

padding:16px 35px;
font-size:20px;
background:#ff4d88;
color:white;
border:none;
border-radius:20px;
cursor:pointer;
transition:.3s;

}

button:hover{

transform:scale(1.08);

}

#texto{

margin-top:30px;
font-size:22px;
line-height:1.8;
color:#444;
min-height:320px;

}

.coracao{

position:fixed;
top:-30px;
color:#ff3b7d;
font-size:25px;
animation:cair linear forwards;
pointer-events:none;

}

@keyframes cair{

0%{

transform:translateY(-10vh) rotate(0deg);
opacity:1;

}

100%{

transform:translateY(110vh) rotate(360deg);
opacity:0;

}

}

</style>

</head>

<body>

<div class="caixa">

<h1>❤️ Para Anna Laura Pedroso ❤️</h1>

<button id="botao" onclick="clicou()">

Clique aqui ❤️

</button>

<div id="texto"></div>

</div>

<script>

let tentativa=0;

const frasesBotao=[

"Ops!",
"Quase",
"Mais uma",
"Tá chegando..."

];

const texto=`

Obrigado por ser a mulher da minha vida.
Obrigado por estar ao meu lado.
Obrigado por fazer meus dias mais felizes.
Seu sorriso ilumina qualquer dia chuvoso.
Cada momento com você vale a pena.
Você é minha paz, minha alegria.
Espero construir muitos sonhos com você.
E nunca quero deixar de escolher você.
Eu te amo infinitamente.
-M

`;

function clicou(){

tentativa++;

const botao=document.getElementById("botao");

if(tentativa<=4){

botao.innerHTML=frasesBotao[tentativa-1];

let largura=window.innerWidth-botao.offsetWidth-40;
let altura=window.innerHeight-botao.offsetHeight-40;

let x=Math.random()*largura;
let y=Math.random()*altura;

botao.style.position="fixed";
botao.style.left=x+"px";
botao.style.top=y+"px";

}

else{

botao.style.display="none";

document.querySelector("h1").innerHTML="❤️ Para Anna Laura Pedroso ❤️";

maquina();

}

}

function maquina(){

let i=0;

const destino=document.getElementById("texto");

function escrever(){

if(i<texto.length){

destino.innerHTML+=texto.charAt(i).replace(/\n/g,"<br>");

i++;

setTimeout(escrever,45);

}

}

escrever();

}

function criarCoracao(){

const coracao=document.createElement("div");

coracao.classList.add("coracao");

coracao.innerHTML="❤️";

coracao.style.left=Math.random()*100+"vw";

coracao.style.fontSize=(15+Math.random()*25)+"px";

coracao.style.animationDuration=(4+Math.random()*5)+"s";

document.body.appendChild(coracao);

setTimeout(()=>{

coracao.remove();

},9000);

}

setInterval(criarCoracao,220);

</script>

</body>

</html>
